name: Daily APEX/SpaceX data update

'on':
  schedule:
    # 매일 한국시간(KST, UTC+9) 오전 7시 = UTC 전일 22시.
    # 미국 증시 마감(현지 종가) 이후 + 서울외국환중개 매매기준율 고시 이후 시각으로 설정.
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily fetch script
        env:
          # (선택) https://ecos.bok.or.kr 에서 무료 발급받은 개인 API 키를 저장소
          # Settings > Secrets and variables > Actions 에 ECOS_API_KEY 로 등록하면 사용됩니다.
          # 미등록 시 공개 샘플 키('sample', 1회 최대 10건)로 자동 폴백합니다.
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python fetch_daily_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_log.csv data/raw_spcx_price.csv data/raw_fx_bok.csv
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git push
